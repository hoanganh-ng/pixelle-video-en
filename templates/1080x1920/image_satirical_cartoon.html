<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1024">
    <meta name="template:media-height" content="1024">
    <meta name="viewport" content="width=1080, height=1920">
    <title>80s Satirical Cartoon Style Full Screen Image Title Only - 1080x1920</title>
    <!-- Google Fonts - Chinese Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Noto+Serif+SC:wght@400;700;900&family=Liu+Jian+Mao+Cao&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { width: 1080px; height: 1920px; overflow: hidden; }

        body {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #fff;
            position: relative;
            background: transparent; /* Remove black background */
        }

        /* Background uses image with blur effect, covering the entire page */
        .bg {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url("{{image}}");
            background-size: cover;
            background-position: center;
            z-index: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .title {
            width: 900px;
            text-align: center;
            font-size: 92px;
            font-weight: 800;
            line-height: 1.2;
            text-shadow: 0 6px 22px rgba(0,0,0,0.6),
                        -2px -2px 0 #000,
                        2px -2px 0 #000,
                        -2px 2px 0 #000,
                        2px 2px 0 #000;
            letter-spacing: 4px;
            /* Ensure text does not overflow */
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: nowrap;
        }

        /* Footer */
        .footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 25px 20px 0 20px;
            position: absolute;
            bottom: 20px;
            color: #fff;
            text-shadow: -1px -1px 0 #000,
                        1px -1px 0 #000,
                        -1px 1px 0 #000,
                        1px 1px 0 #000;
        }
        
        .author {
            display: flex;
            flex-direction: column;
            gap: 6px;
            letter-spacing: 2px;
        }
        
        .author-name {
            font-size: 30px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .author-mark {
            width: 8px;
            height: 8px;
            /* border-radius: 50%; */
            /* background: rgba(149, 165, 166, 0.7); */
        }
        
        .author-desc {
            font-size: 22px;
            /* color: #5d6d7e; */
            line-height: 1.3;
            font-weight: 400;
        }
        
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 500;
        }
        
        .logo-marks {
            display: flex;
            gap: 5px;
        }
        
        .logo-mark {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(149, 165, 166, 0.45);
        }
        
        .logo-mark.active {
            background: rgba(149, 165, 166, 0.75);
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="title">{{title}}</div>
    </div>
    <div class="footer">
        <div class="author">
            <div class="author-name">
                <span class="author-mark"></span>
                <div class="logo">{{author=@Pixelle.AI}}</div>
            </div>
            <div class="author-desc">{{describe=Open Source Omnimodal AI Creative Agent}}</div>
        </div>
        <div class="logo-section">
            <div class="logo">{{brand=Pixelle-Video}}</div>
            <div class="logo-marks">
                <div class="logo-mark"></div>
                <div class="logo-mark active"></div>
                <div class="logo-mark"></div>
                <div class="logo-mark"></div>
            </div>
        </div>
    </div>
    <script>
        /**
         * Automatically adjust font size based on text width
         * @param {HTMLElement} element - Element to adjust
         * @param {number} maxWidth - Maximum width (px)
         * @param {number} minFontSize - Minimum font size (px)
         * @param {number} maxFontSize - Maximum font size (px)
         */
        function autoFitFontSize(element, maxWidth, minFontSize, maxFontSize) {
            try {
                if (!element || !element.textContent || !element.textContent.trim()) {
                    return;
                }
                
                if (!document.body) {
                    return;
                }
                
                // Create a temporary measurement element
                const measure = document.createElement('span');
                measure.style.visibility = 'hidden';
                measure.style.position = 'absolute';
                measure.style.top = '-9999px';
                measure.style.left = '-9999px';
                measure.style.whiteSpace = 'nowrap';
                
                // Copy element styles
                const computedStyle = window.getComputedStyle(element);
                measure.style.fontFamily = computedStyle.fontFamily;
                measure.style.fontSize = computedStyle.fontSize;
                measure.style.fontWeight = computedStyle.fontWeight;
                measure.style.letterSpacing = computedStyle.letterSpacing;
                measure.textContent = element.textContent;
                
                document.body.appendChild(measure);
                
                // Binary search for appropriate font size
                let low = minFontSize;
                let high = maxFontSize;
                let bestSize = maxFontSize;
                
                // Check if maximum font size fits first
                measure.style.fontSize = maxFontSize + 'px';
                if (measure.offsetWidth <= maxWidth) {
                    bestSize = maxFontSize;
                } else {
                    // Use binary search
                    while (high - low > 0.5) {
                        const mid = (low + high) / 2;
                        measure.style.fontSize = mid + 'px';
                        
                        if (measure.offsetWidth <= maxWidth) {
                            bestSize = mid;
                            low = mid;
                        } else {
                            high = mid;
                        }
                    }
                }
                
                // Apply found font size
                element.style.fontSize = bestSize + 'px';
                
                // Clean up temporary element
                if (measure.parentNode) {
                    document.body.removeChild(measure);
                }
            } catch (error) {
                console.error('Auto-adjust font size error:', error);
            }
        }
        
        // Automatically adjust font size after page load
        function initAutoFit() {
            try {
                const titleElement = document.querySelector('.title');
                if (titleElement) {
                    // Get actual container width
                    const maxWidth = 900;
                    // Auto-adjust font size: min 12px, max 72px
                    autoFitFontSize(titleElement, maxWidth, 12, 72);
                }
            } catch (error) {
                console.error('Initialize auto-adjust font size error:', error);
            }
        }
        
        // Wait for DOM to finish loading
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initAutoFit);
        } else {
            // DOM is already loaded
            initAutoFit();
        }
        
        // If content is dynamically inserted via template engine, observe content changes
        // Use MutationObserver to watch text changes
        if (typeof MutationObserver !== 'undefined') {
            try {
                const observer = new MutationObserver(function(mutations) {
                    let shouldUpdate = false;
                    mutations.forEach(function(mutation) {
                        if (mutation.type === 'childList' || mutation.type === 'characterData') {
                            shouldUpdate = true;
                        }
                    });
                    
                    if (shouldUpdate) {
                        // Delay execution to avoid frequent calls
                        setTimeout(initAutoFit, 100);
                    }
                });
                
                // Wait until body element exists before observing
                if (document.body) {
                    observer.observe(document.body, {
                        childList: true,
                        subtree: true,
                        characterData: true
                    });
                } else {
                    document.addEventListener('DOMContentLoaded', function() {
                        if (document.body) {
                            observer.observe(document.body, {
                                childList: true,
                                subtree: true,
                                characterData: true
                            });
                        }
                    });
                }
            } catch (error) {
                console.error('Setting MutationObserver error:', error);
            }
        }
    </script>
</body>
</html>
